name: codeworks-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      PORT: 3000
      REDIS_URL: redis://redis:6379
      STORAGE_LOCAL_ROOT: /var/lib/codeworks/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - app_uploads:/var/lib/codeworks/uploads

  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_NAME: ${SERVER_NAME:?set SERVER_NAME}
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx

  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    env_file:
      - .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/backup-postgres.sh"]
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts:ro

volumes:
  app_uploads:
  nginx_cache:
  postgres_data:
  redis_data:
